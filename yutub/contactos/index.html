<section>
    <h2 align="center">Formulario de contacto</h2>

    <form action="#" method="post">

        <label>Nombre completo:</label><br>
        <input type="text" name="nombre" maxlength="40" required><br><br>

        <label>Correo electrónico:</label><br>
        <input type="email" name="correo" required><br><br>

        <label>Teléfono:</label><br>
        <input type="tel" name="telefono"><br><br>

        <label>Asunto:</label><br>
        <input type="text" name="asunto"><br><br>

        <label>Comentario:</label><br>
        <textarea name="mensaje" rows="5" cols="30"></textarea><br><br>

        <input type="checkbox"> Acepto términos y condiciones<br><br>

        <input type="submit" value="Enviar mensaje">

    </form>
</section>
